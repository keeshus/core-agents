# ── Core Agents E2E Test (app + infra in Docker, Playwright on host) ─
# Start:  docker compose -f docker-compose.e2e.yml up -d --wait
# Stop:   docker compose -f docker-compose.e2e.yml down -v --timeout 10
# Run:    npx playwright test --config frontend/playwright.config.ts
# Debug:  npx playwright test --config frontend/playwright.config.ts --headed

services:
  postgres-e2e:
    image: postgres:17-alpine
    container_name: core-agents-e2e-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: coreagents
      POSTGRES_PASSWORD: coreagents
      POSTGRES_DB: coreagents
    tmpfs: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coreagents"]
      interval: 2s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  qdrant-e2e:
    image: qdrant/qdrant:v1.18.0
    container_name: core-agents-e2e-qdrant
    ports:
      - "6333:6333"
    tmpfs: /qdrant/storage
    restart: unless-stopped

  valkey-e2e:
    image: valkey/valkey:7-alpine
    container_name: core-agents-e2e-valkey
    ports:
      - "6379:6379"
    command: valkey-server --requirepass dev-valkey
    tmpfs: /data
    restart: unless-stopped

  db-migrate-e2e:
    image: node:25-alpine
    container_name: core-agents-e2e-migrate
    working_dir: /repo
    volumes:
      - .:/repo
    entrypoint:
      - sh
      - -c
      - cd backend && DATABASE_URL=postgres://coreagents:coreagents@postgres-e2e:5432/coreagents npx drizzle-kit push --config drizzle.config.ts
    depends_on:
      postgres-e2e:
        condition: service_healthy

  backend-e2e:
    build:
      context: .
      dockerfile: backend/Dockerfile.e2e
    container_name: core-agents-e2e-backend
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://coreagents:coreagents@postgres-e2e:5432/coreagents
      JWT_SECRET: e2e-test-secret
      FRONTEND_URL: http://localhost:3000
      VALKEY_HOST: valkey-e2e
      VALKEY_PASSWORD: dev-valkey
    depends_on:
      postgres-e2e:
        condition: service_healthy
      db-migrate-e2e:
        condition: service_completed_successfully
      mock-oidc-e2e:
        condition: service_started

  frontend-e2e:
    build:
      context: .
      dockerfile: frontend/Dockerfile.e2e
    container_name: core-agents-e2e-frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend-e2e:3001
      NEXT_PUBLIC_API_URL: /api
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - backend-e2e

  worker-e2e:
    build:
      context: .
      dockerfile: worker/Dockerfile.e2e
    container_name: core-agents-e2e-worker
    environment:
      DATABASE_URL: postgres://coreagents:coreagents@postgres-e2e:5432/coreagents
      VALKEY_HOST: valkey-e2e
      VALKEY_PASSWORD: dev-valkey
    depends_on:
      postgres-e2e:
        condition: service_healthy
      db-migrate-e2e:
        condition: service_completed_successfully
      valkey-e2e:
        condition: service_started

  mock-llm-e2e:
    build:
      context: ./test/mock-llm
      dockerfile: Dockerfile
    container_name: core-agents-e2e-mock-llm
    ports:
      - "3002:3002"

  mock-mcp-e2e:
    build:
      context: ./test/mock-mcp
      dockerfile: Dockerfile
    container_name: core-agents-e2e-mock-mcp
    ports:
      - "3003:3003"

  mock-oidc-e2e:
    build:
      context: ./test/mock-oidc
      dockerfile: Dockerfile
    container_name: core-agents-e2e-mock-oidc
    ports:
      - "3004:3004"
